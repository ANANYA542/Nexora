<!DOCTYPE html>
<html>
<head><title>Categories | Finza</title><link rel="stylesheet" href="css/styles.css"></head>
<body>
  <nav>
    <div class="nav-logo">Finza</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="transactions.html">Transactions</a>
      <a href="budgets.html">Budgets</a>
      <a href="categories.html" class="active">Categories</a>
      <a href="reports.html">Reports</a>
    </div>
    <div class="nav-actions">
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="split-layout">
      <div class="form-panel">
        <h3>Create Category</h3>
        <form id="categoryForm">
          <div class="form-group">
            <label>Name</label>
            <input type="text" id="categoryName" required placeholder="e.g. Insurance">
          </div>
          <div class="form-group">
            <label>Type</label>
            <select id="categoryType" required>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <button type="submit" class="primary">Add Category</button>
        </form>
      </div>

      <div>
        <div class="page-header">
          <h2>Categories</h2>
          <p>Manage your personal categories and view system defaults.</p>
        </div>

        <table>
          <thead>
            <tr><th>Name</th><th>Type</th><th>Scope</th><th></th></tr>
          </thead>
          <tbody id="categoriesTable"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/categories.js"></script>
</body>
</html>
