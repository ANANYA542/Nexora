<!DOCTYPE html>
<html>
<head>
  <title>Register | Finza</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <h2>Welcome to Finza</h2>
      <p class="subtitle">Your personal finance tracker</p>
      
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="Aurelian">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="user@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="primary">Register</button>
      </form>
      
      <div class="auth-separator">OR</div>

      <div id="g_id_onload"
           data-client_id="201448844450-37ksnuseiv9grqoe9iuudpqtd4mkn2be.apps.googleusercontent.com"
           data-context="signup"
           data-ux_mode="popup"
           data-callback="handleGoogleLogin"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signup_with" data-size="large" style="display:flex; justify-content:center;"></div>
      
      <div class="auth-link">
        Already have an account? <a href="index.html">Login</a>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
