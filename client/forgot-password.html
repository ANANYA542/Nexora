<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password | Finza</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <h2>Reset Password</h2>
      <p class="subtitle">Enter your email and we'll send a reset link.</p>
      
      <form id="forgotPasswordForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="resetEmail" required placeholder="user@example.com">
        </div>
        <button type="submit" class="btn primary" style="width: 100%;">Send Reset Link</button>
      </form>
      
      <div class="auth-link" style="margin-top: 16px;">
        Remembered it? <a href="index.html">Back to Login</a>
      </div>
    </div>
  </div>
  
  <script src="js/api.js?v=2"></script>
  <script>
    document.getElementById('forgotPasswordForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;
      try {
        await apiCall('/auth/forgot-password', 'POST', { email });
        alert('If an account exists, a secure token has been dispatched via email. Please check your inbox.');
      } catch (err) {
        alert(err.message);
      }
    };
  </script>
</body>
</html>
