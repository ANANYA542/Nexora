<!DOCTYPE html>
<html>
<head><title>Transactions | Finza</title><link rel="stylesheet" href="css/styles.css"></head>
<body>
  <nav>
    <div class="nav-logo">Finza</div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="transactions.html" class="active">Transactions</a>
      <a href="budgets.html">Budgets</a>
      <a href="categories.html">Categories</a>
      <a href="reports.html">Reports</a>
    </div>
    <div class="nav-actions">
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="split-layout">
      <div>
        <div class="page-header">
          <h2>Transactions</h2>
          <p>A precise record of your capital movement.</p>
        </div>

        <table>
          <thead>
            <tr><th>Date</th><th>Description</th><th>Category</th><th>Value</th><th>Receipt</th><th></th></tr>
          </thead>
          <tbody id="txTable"></tbody>
        </table>
      </div>

      <div class="form-panel">
        <h3 id="txFormTitle">New Entry</h3>
        <form id="txForm">
          <input type="hidden" id="txId">
          <div class="form-group">
            <label>Amount & Currency</label>
            <div class="inline-row">
              <input type="number" id="amount" required placeholder="0.00" style="flex:1;">
              <select id="currency" style="width:88px;">
                <option>INR</option>
                <option>USD</option>
                <option>EUR</option>
                <option>GBP</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Entry Type</label>
            <select id="type" required>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div class="form-group">
            <label>Category</label>
            <div class="inline-row">
              <select id="category_id" style="flex:1;"></select>
              <button type="button" class="secondary small" id="autoCategorizeButton">Auto Categorize</button>
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="description" placeholder="e.g. Annual Consulting Fee">
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label>Receipt Document</label>
            <input type="file" id="receipt" accept="image/jpeg, image/png, application/pdf">
            <button type="button" class="secondary small" id="extractReceiptButton" style="margin-top:12px;">Extract Receipt</button>
          </div>
          <div class="inline-actions">
            <button type="submit" class="primary" id="txSubmitButton">Create Transaction</button>
            <button type="button" class="secondary" id="cancelTxEdit" style="display:none;">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/transactions.js"></script>
</body>
</html>
