<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    /* ── Nav ── */
    nav { background: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
    nav h1 { font-size: 1.2rem; color: #38bdf8; font-weight: 700; }
    nav #userInfo { font-size: 0.85rem; color: #94a3b8; }
    nav button { background: #ef4444; color: white; border: none; padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }

    /* ── Layout ── */
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .section { background: #1e293b; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #334155; }
    .section h2 { color: #38bdf8; margin-bottom: 1rem; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Auth ── */
    #authSection { max-width: 420px; margin: 4rem auto; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab { flex: 1; padding: 0.6rem; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #94a3b8; cursor: pointer; text-align: center; }
    .tab.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 600; }

    /* ── Forms ── */
    form { display: flex; flex-direction: column; gap: 0.75rem; }
    label { font-size: 0.8rem; color: #94a3b8; }
    input, select, textarea { width: 100%; padding: 0.6rem 0.8rem; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; }
    input:focus, select:focus { outline: none; border-color: #38bdf8; }
    button.btn { padding: 0.65rem 1.2rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    .btn-primary { background: #38bdf8; color: #0f172a; }
    .btn-danger  { background: #ef4444; color: white; font-size: 0.75rem; padding: 0.3rem 0.7rem; }
    .btn-secondary { background: #334155; color: #e2e8f0; }

    /* ── Dashboard cards ── */
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: #0f172a; border-radius: 10px; padding: 1.2rem; border: 1px solid #334155; }
    .card .label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
    .card .value { font-size: 1.8rem; font-weight: 700; margin-top: 0.25rem; }
    .card.income .value { color: #4ade80; }
    .card.expense .value { color: #f87171; }
    .card.savings .value { color: #38bdf8; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.6rem 0.8rem; background: #0f172a; color: #64748b; font-size: 0.75rem; text-transform: uppercase; }
    td { padding: 0.7rem 0.8rem; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #1e293b33; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
    .badge.income  { background: #14532d; color: #4ade80; }
    .badge.expense { background: #450a0a; color: #f87171; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 2rem; right: 2rem; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 0.8rem 1.4rem; border-radius: 8px; font-size: 0.875rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; }
    #toast.error { border-color: #ef4444; color: #f87171; }
    #toast.success { border-color: #4ade80; color: #4ade80; }

    /* ── Misc ── */
    .row { display: flex; gap: 1rem; }
    .row > * { flex: 1; }
    .hidden { display: none !important; }
    #app { display: none; }
    .empty { color: #475569; text-align: center; padding: 2rem; font-size: 0.875rem; }
    .budget-bar { background: #0f172a; border-radius: 999px; height: 8px; margin-top: 0.4rem; }
    .budget-fill { height: 100%; border-radius: 999px; transition: width 0.4s; }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ══ AUTH ══════════════════════════════════════════════════════════════ -->
<div id="authSection" class="container">
  <div class="section">
    <h2 style="text-align:center; margin-bottom:1.5rem;">💰 Finance Tracker</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" required />
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" required />
      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <form id="registerForm" class="hidden">
      <label>Name</label>
      <input type="text" id="regName" placeholder="Your name" required />
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="you@example.com" required />
      <label>Password (min 8 chars)</label>
      <input type="password" id="regPassword" placeholder="••••••••" required />
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════════════════════ -->
<div id="app">
  <nav>
    <h1>💰 Finance Tracker</h1>
    <div style="display:flex; gap:1rem; align-items:center;">
      <span id="userInfo"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container">

    <!-- Dashboard -->
    <div class="section">
      <h2>📊 Dashboard</h2>
      <div class="cards">
        <div class="card income"><div class="label">Total Income</div><div class="value" id="dIncome">₹0</div></div>
        <div class="card expense"><div class="label">Total Expense</div><div class="value" id="dExpense">₹0</div></div>
        <div class="card savings"><div class="label">Savings</div><div class="value" id="dSavings">₹0</div></div>
      </div>
      <div class="row">
        <div>
          <strong style="font-size:0.85rem; color:#94a3b8;">Top Expense Categories</strong>
          <div id="expCatList" style="margin-top:0.5rem;"></div>
        </div>
        <div>
          <strong style="font-size:0.85rem; color:#94a3b8;">Highest Spending Day</strong>
          <div id="topDay" style="margin-top:0.5rem; color:#f87171; font-size:1.1rem; font-weight:600;"></div>
        </div>
      </div>
    </div>

    <!-- Add Transaction -->
    <div class="section">
      <h2>➕ Add Transaction</h2>
      <form id="txnForm">
        <div class="row">
          <div>
            <label>Type</label>
            <select id="txnType" onchange="filterCategoriesByType()">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
          <div>
            <label>Category</label>
            <select id="txnCategory"></select>
          </div>
        </div>
        <div class="row">
          <div>
            <label>Amount (negative for refunds)</label>
            <input type="number" id="txnAmount" step="0.01" placeholder="e.g. 5000 or -200" required />
          </div>
          <div>
            <label>Date</label>
            <input type="date" id="txnDate" required />
          </div>
        </div>
        <label>Description (optional)</label>
        <input type="text" id="txnDesc" placeholder="Brief note" />
        <button type="submit" class="btn btn-primary">Add Transaction</button>
      </form>
    </div>

    <!-- Transactions List -->
    <div class="section">
      <h2>📋 Transactions</h2>
      <div class="row" style="margin-bottom:1rem;">
        <select id="filterType" onchange="loadTransactions()">
          <option value="">All types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <input type="date" id="filterStart" onchange="loadTransactions()" placeholder="From" />
        <input type="date" id="filterEnd" onchange="loadTransactions()" placeholder="To" />
      </div>
      <table>
        <thead><tr><th>Date</th><th>Category</th><th>Type</th><th>Amount</th><th>Description</th><th></th></tr></thead>
        <tbody id="txnTable"></tbody>
      </table>
      <div id="txnPagination" style="margin-top:1rem; font-size:0.8rem; color:#64748b;"></div>
    </div>

    <!-- Budgets -->
    <div class="section">
      <h2>🎯 Budgets</h2>
      <form id="budgetForm" style="display:flex; gap:0.75rem; flex-wrap:wrap; align-items:flex-end; margin-bottom:1rem;">
        <div style="flex:2; min-width:160px;">
          <label>Expense Category</label>
          <select id="budgetCategory"></select>
        </div>
        <div>
          <label>Limit (₹)</label>
          <input type="number" id="budgetLimit" min="1" step="0.01" placeholder="8000" style="width:110px;" />
        </div>
        <div>
          <label>Month</label>
          <input type="number" id="budgetMonth" min="1" max="12" placeholder="4" style="width:70px;" />
        </div>
        <div>
          <label>Year</label>
          <input type="number" id="budgetYear" min="2000" placeholder="2026" style="width:90px;" />
        </div>
        <button type="submit" class="btn btn-primary">Set Budget</button>
      </form>
      <div id="budgetList"></div>
    </div>

    <!-- Monthly Report -->
    <div class="section">
      <h2>📈 Monthly Report</h2>
      <div style="display:flex; gap:0.75rem; margin-bottom:1rem; align-items:flex-end;">
        <div>
          <label style="font-size:0.8rem; color:#94a3b8; display:block;">Year</label>
          <input type="number" id="reportYear" value="2026" min="2000" style="width:100px;" />
        </div>
        <button class="btn btn-secondary" onclick="loadReport()">Generate Report</button>
      </div>
      <table>
        <thead><tr><th>Month</th><th>Income</th><th>Expense</th><th>Savings</th></tr></thead>
        <tbody id="reportTable"></tbody>
      </table>
    </div>

  </div><!-- /container -->
</div><!-- /app -->

<script>
const API = 'http://localhost:5003';
let token = localStorage.getItem('ft_token') || '';
let allCategories = [];
const today = new Date().toISOString().slice(0, 10);

// ── Utility ────────────────────────────────────────────────────────────────
function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2 }); }

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => el.className = '', 3000);
}

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers });
  const data = await res.json();
  if (!data.success) throw new Error(data.message || 'Request failed');
  return data.data;
}

// ── Auth ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'login' ? 0 : 1)));
  document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
  document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
}

document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const d = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value }) });
    token = d.token; localStorage.setItem('ft_token', token);
    initApp(d.user);
  } catch(err) { toast(err.message, 'error'); }
};

document.getElementById('registerForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const d = await api('/api/auth/register', { method: 'POST', body: JSON.stringify({ name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value }) });
    token = d.token; localStorage.setItem('ft_token', token);
    initApp(d.user);
  } catch(err) { toast(err.message, 'error'); }
};

function logout() {
  token = ''; localStorage.removeItem('ft_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('authSection').style.display = 'block';
}

// ── Init ───────────────────────────────────────────────────────────────────
async function initApp(user) {
  document.getElementById('authSection').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userInfo').textContent = `👤 ${user.name}`;
  document.getElementById('txnDate').value = today;
  const now = new Date();
  document.getElementById('budgetMonth').value = now.getMonth() + 1;
  document.getElementById('budgetYear').value = now.getFullYear();
  await loadCategories();
  await Promise.all([loadDashboard(), loadTransactions(), loadBudgets()]);
}

// ── Categories ─────────────────────────────────────────────────────────────
async function loadCategories() {
  const d = await api('/api/categories');
  allCategories = d.categories;
  filterCategoriesByType();
  const expCats = allCategories.filter(c => c.type === 'expense');
  const sel = document.getElementById('budgetCategory');
  sel.innerHTML = expCats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function filterCategoriesByType() {
  const type = document.getElementById('txnType').value;
  const cats = allCategories.filter(c => c.type === type);
  document.getElementById('txnCategory').innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

// ── Dashboard ─────────────────────────────────────────────────────────────
async function loadDashboard() {
  const d = await api('/api/dashboard');
  document.getElementById('dIncome').textContent  = fmt(d.summary.total_income);
  document.getElementById('dExpense').textContent = fmt(d.summary.total_expense);
  document.getElementById('dSavings').textContent = fmt(d.summary.savings);
  document.getElementById('dSavings').style.color = d.summary.savings >= 0 ? '#38bdf8' : '#f87171';

  const top = d.expense_by_category.slice(0, 4);
  document.getElementById('expCatList').innerHTML = top.length
    ? top.map(c => `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.85rem;"><span>${c.category_name}</span><span style="color:#f87171;">${fmt(c.total)}</span></div>`).join('')
    : '<div class="empty">No expense data</div>';

  if (d.highest_spending_day) {
    document.getElementById('topDay').textContent = `${d.highest_spending_day.date}  —  ${fmt(d.highest_spending_day.total_expense)}`;
  } else {
    document.getElementById('topDay').textContent = 'No data yet';
  }
}

// ── Transactions ──────────────────────────────────────────────────────────
async function loadTransactions(page = 1) {
  const type  = document.getElementById('filterType').value;
  const start = document.getElementById('filterStart').value;
  const end   = document.getElementById('filterEnd').value;
  let q = `?page=${page}&limit=10`;
  if (type)  q += `&type=${type}`;
  if (start) q += `&start_date=${start}`;
  if (end)   q += `&end_date=${end}`;

  const d = await api('/api/transactions' + q);
  const tbody = document.getElementById('txnTable');
  if (!d.transactions.length) { tbody.innerHTML = `<tr><td colspan="6" class="empty">No transactions found</td></tr>`; return; }

  tbody.innerHTML = d.transactions.map(t => `
    <tr>
      <td>${t.date}</td>
      <td>${t.category_name}</td>
      <td><span class="badge ${t.type}">${t.type}</span></td>
      <td style="color:${t.type==='income'?'#4ade80':'#f87171'}; font-weight:600;">${fmt(t.amount)}</td>
      <td style="color:#94a3b8;">${t.description || '—'}</td>
      <td><button class="btn btn-danger" onclick="deleteTxn('${t.id}')">✕</button></td>
    </tr>`).join('');

  const p = d.pagination;
  document.getElementById('txnPagination').innerHTML =
    `Showing page ${p.page} of ${p.totalPages} (${p.total} total)
     ${p.page > 1 ? `<button class="btn btn-secondary" style="margin-left:0.5rem;padding:0.2rem 0.6rem;font-size:0.75rem;" onclick="loadTransactions(${p.page-1})">◀ Prev</button>` : ''}
     ${p.page < p.totalPages ? `<button class="btn btn-secondary" style="margin-left:0.3rem;padding:0.2rem 0.6rem;font-size:0.75rem;" onclick="loadTransactions(${p.page+1})">Next ▶</button>` : ''}`;
}

document.getElementById('txnForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    await api('/api/transactions', { method: 'POST', body: JSON.stringify({
      category_id: document.getElementById('txnCategory').value,
      type: document.getElementById('txnType').value,
      amount: parseFloat(document.getElementById('txnAmount').value),
      description: document.getElementById('txnDesc').value || undefined,
      date: document.getElementById('txnDate').value,
    })});
    toast('Transaction added ✓');
    document.getElementById('txnAmount').value = '';
    document.getElementById('txnDesc').value = '';
    await Promise.all([loadTransactions(), loadDashboard(), loadBudgets()]);
  } catch(err) { toast(err.message, 'error'); }
};

async function deleteTxn(id) {
  if (!confirm('Delete this transaction?')) return;
  try {
    await api('/api/transactions/' + id, { method: 'DELETE' });
    toast('Transaction deleted');
    await Promise.all([loadTransactions(), loadDashboard(), loadBudgets()]);
  } catch(err) { toast(err.message, 'error'); }
}

// ── Budgets ───────────────────────────────────────────────────────────────
async function loadBudgets() {
  const month = document.getElementById('budgetMonth').value;
  const year  = document.getElementById('budgetYear').value;
  const d = await api(`/api/budgets?month=${month}&year=${year}`);
  const el = document.getElementById('budgetList');
  if (!d.budgets.length) { el.innerHTML = '<div class="empty">No budgets set for this period</div>'; return; }

  el.innerHTML = d.budgets.map(b => {
    const pct = Math.min((b.amount_spent / b.limit_amount) * 100, 100).toFixed(0);
    const color = b.is_over_budget ? '#ef4444' : pct > 80 ? '#f97316' : '#4ade80';
    return `<div style="margin-bottom:1rem; padding:0.8rem; background:#0f172a; border-radius:8px; border:1px solid #334155;">
      <div style="display:flex;justify-content:space-between;font-size:0.875rem;">
        <strong>${b.category_name}</strong>
        <span style="color:${color};">${fmt(b.amount_spent)} / ${fmt(b.limit_amount)}</span>
      </div>
      <div class="budget-bar"><div class="budget-fill" style="width:${pct}%;background:${color};"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#64748b;margin-top:0.3rem;">
        <span>${b.is_over_budget ? '⚠️ Over budget!' : `${fmt(b.remaining)} remaining`}</span>
        <button class="btn btn-danger" onclick="deleteBudget('${b.id}')">Remove</button>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('budgetForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    await api('/api/budgets', { method: 'POST', body: JSON.stringify({
      category_id: document.getElementById('budgetCategory').value,
      limit_amount: parseFloat(document.getElementById('budgetLimit').value),
      month: parseInt(document.getElementById('budgetMonth').value),
      year: parseInt(document.getElementById('budgetYear').value),
    })});
    toast('Budget saved ✓');
    await loadBudgets();
  } catch(err) { toast(err.message, 'error'); }
};

async function deleteBudget(id) {
  try {
    await api('/api/budgets/' + id, { method: 'DELETE' });
    toast('Budget removed');
    await loadBudgets();
  } catch(err) { toast(err.message, 'error'); }
}

// ── Report ─────────────────────────────────────────────────────────────────
async function loadReport() {
  const year = document.getElementById('reportYear').value;
  const d = await api(`/api/reports/monthly?year=${year}`);
  const tbody = document.getElementById('reportTable');
  if (!d.report.length) { tbody.innerHTML = `<tr><td colspan="4" class="empty">No data for ${year}</td></tr>`; return; }
  tbody.innerHTML = d.report.map(r => `
    <tr>
      <td>${r.month}</td>
      <td style="color:#4ade80;">${fmt(r.total_income)}</td>
      <td style="color:#f87171;">${fmt(r.total_expense)}</td>
      <td style="color:${r.savings>=0?'#38bdf8':'#f87171'};font-weight:600;">${fmt(r.savings)}</td>
    </tr>`).join('');
}

// ── Boot ───────────────────────────────────────────────────────────────────
if (token) {
  api('/api/auth/profile').then(d => initApp(d.user)).catch(() => { localStorage.removeItem('ft_token'); token = ''; });
}
</script>
</body>
</html>
