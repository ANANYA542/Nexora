<!DOCTYPE html>
<html>
<head>
  <title>Set New Password | Finza</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-box">
      <h2>Create New Password</h2>
      <p class="subtitle" id="statusText">Validating secure token...</p>
      
      <form id="resetPasswordForm" class="hidden">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="newPassword" required placeholder="••••••••" minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn primary" style="width: 100%;">Save Password</button>
      </form>
    </div>
  </div>
  
  <script src="js/api.js?v=2"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const statusText = document.getElementById('statusText');
    const form = document.getElementById('resetPasswordForm');
    
    if (!token) {
      statusText.innerHTML = '<span style="color:red">No security token provided. Please use the exact link sent to your email.</span>';
    } else {
      // Phase 1: Verify token FIRST per strict instructions
      apiCall(`/auth/verify-reset-token?token=${token}`, 'GET')
        .then(() => {
          statusText.innerText = 'Token verified safely. Enter your new password.';
          form.classList.remove('hidden');
        })
        .catch((err) => {
          statusText.innerHTML = `<span style="color:red">Token Error: ${err.message}. Link may be expired (15 min limit).</span>`;
        });
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const new_password = document.getElementById('newPassword').value;
      const confirm_password = document.getElementById('confirmPassword').value;
      
      if (new_password !== confirm_password) {
        return alert('Passwords do not match!');
      }

      try {
        const res = await apiCall('/auth/reset-password', 'POST', { token, new_password });
        alert(res.message || 'Password reset successfully! Proceeding to Login.');
        window.location.replace('index.html');
      } catch (err) {
        alert(err.message);
      }
    };
  </script>
</body>
</html>
